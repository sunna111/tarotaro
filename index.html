.yn-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.yn-card.picked{pointer-events:none;opacity:.15;transform:scale(.9)}
.yn-card.revealed{background:linear-gradient(180deg,#fdf6e3,#f5e6c8,#ede0c8);animation:flipIn .6s ease}

function fmtText(){
var t="\ud83d\udd2e \ucf08\ud2f1 \ud06c\ub85c\uc2a4 \ud0c0\ub85c \ub9ac\ub529 \uacb0\uacfc\n";if(S.q) t+="\uc9c8\ubb38: "+S.q+"\n";
t+="\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n";
S.cards.forEach(function(c,i){t+=POS[i].label+". "+POS[i].kr+": "+c.card.sym+" "+c.card.kr+" ("+(c.reversed?"\uc5ed\ubc29\ud5a5":"\uc815\ubc29\ud5a5")+") ["+(c.card.type==="major"?"\uba54\uc774\uc800":c.card.suit.kr)+"]\n"});
if(S.followUps.length>0){t+="\n\u2500\u2500\u2500 \ucd94\uac00 \uc9c8\ubb38 \u2500\u2500\u2500\n";S.followUps.forEach(function(fu,fi){t+="\nQ"+(fi+1)+": "+fu.question+"\n";fu.cards.forEach(function(c){t+="  \u2192 "+c.card.sym+" "+c.card.kr+" ("+(c.reversed?"\uc5ed\ubc29\ud5a5":"\uc815\ubc29\ud5a5")+")\n"})})}
t+="\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\uc774 \ud0c0\ub85c \uacb0\uacfc\ub97c \uc2ec\uce35 \ud574\uc11d\ud574\uc8fc\uc138\uc694!";return t}

function doCopy(text){
if(!text) text=S.mode==="yn"?ynFmtText():fmtText();
try{navigator.clipboard.writeText(text).then(function(){S.copied=true;render();setTimeout(function(){S.copied=false;render()},2500)}).catch(fb)}catch(e){fb()}
function fb(){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);S.copied=true;render();setTimeout(function(){S.copied=false;render()},2500)}
}

function goHome(){S.screen="home";S.mode="";S.q="";S.copied=false;render()}

function bindAll(){
var el;
// Home
if(el=document.getElementById("modeYN")) el.onclick=function(){S.mode="yn";S.screen="ynSetup";S.q="";S.ynCnt=1;render()};
if(el=document.getElementById("modeCeltic")) el.onclick=function(){S.mode="celtic";S.screen="intro";S.q="";render()};
// YN Setup
if(el=document.getElementById("ynQIn")) el.oninput=function(){S.q=this.value};
document.querySelectorAll("[data-yncnt]").forEach(function(e){e.onclick=function(){S.ynCnt=parseInt(this.getAttribute("data-yncnt"));render()}});
if(el=document.getElementById("ynStartBtn")) el.onclick=function(){S.ynDeck=shuffle(MAJOR_DECK);S.ynPicked=[];S.ynPI=[];S.screen="ynPick";render()};
if(el=document.getElementById("ynBackBtn")) el.onclick=goHome;
if(el=document.getElementById("ynBack2")) el.onclick=function(){S.screen="ynSetup";render()};
// YN Pick
document.querySelectorAll("[data-ynpick]").forEach(function(e){e.onclick=function(){
var idx=parseInt(this.getAttribute("data-ynpick"));
if(S.ynPI.indexOf(idx)!==-1||S.ynPicked.length>=S.ynCnt) return;
S.ynPI.push(idx);S.ynPicked.push({card:S.ynDeck[idx],reversed:Math.random()<.3});
if(S.ynPicked.length>=S.ynCnt){render();setTimeout(function(){S.screen="ynResult";render()},600)}else render()
}});
// YN Result
if(el=document.getElementById("ynCopyBtn")) el.onclick=function(){doCopy(ynFmtText())};
if(el=document.getElementById("ynAgain")) el.onclick=function(){S.screen="ynSetup";S.copied=false;S.ynPicked=[];S.ynPI=[];render()};
if(el=document.getElementById("ynHome")) el.onclick=goHome;
// Celtic intro
if(el=document.getElementById("qIn")) el.oninput=function(){S.q=this.value};
if(el=document.getElementById("startBtn")) el.onclick=function(){S.deck=shuffle(DECK);S.picked=[];S.pickedCards=[];S.cards=[];S.flipped=[];S.sel=null;S.allRev=false;S.flipOrd=0;S.showTxt=false;S.copied=false;S.followUps=[];S.followIn="";S.followMode=false;S.followQ="";S.followDeck=[];S.followPicked=[];S.followPI=[];S.screen="picking";render()};
if(el=document.getElementById("ccBackBtn")) el.onclick=goHome;
if(el=document.getElementById("backBtn")) el.onclick=function(){S.screen="intro";render()};
if(el=document.getElementById("resetBtn")) el.onclick=function(){S.screen="intro";S.q="";render()};
if(el=document.getElementById("newBtn")) el.onclick=goHome;
if(el=document.getElementById("flipAllBtn")) el.onclick=function(){var d=0;for(var i=S.flipOrd;i<10;i++){(function(ii){setTimeout(function(){S.flipped.push(ii);S.flipOrd=ii+1;if(ii===9)setTimeout(function(){S.allRev=true;render()},300);else render()},d)})(i);d+=250}};
if(el=document.getElementById("closeDetail")) el.onclick=function(){S.sel=null;render()};
if(el=document.getElementById("copyBtn")) el.onclick=function(){doCopy(fmtText())};
if(el=document.getElementById("toggleTxt")) el.onclick=function(){S.showTxt=!S.showTxt;render()};
if(el=document.getElementById("resultTxt")) el.onfocus=function(){this.select()};
if(el=document.getElementById("followIn")){el.oninput=function(){S.followIn=this.value};el.onkeydown=function(e){if(e.key==="Enter"&&S.followIn.trim())doFollow(1)}}
document.querySelectorAll("[data-pick]").forEach(function(e){e.onclick=function(){var di=parseInt(this.getAttribute("data-pick"));if(S.picked.indexOf(di)!==-1||S.pickedCards.length>=10)return;S.picked.push(di);S.pickedCards.push({card:S.deck[di],reversed:Math.random()<.3});if(S.pickedCards.length===10){render();setTimeout(function(){S.cards=S.pickedCards.slice();S.screen="reading";render()},800)}else render()}});
document.querySelectorAll("[data-cpos]").forEach(function(e){e.onclick=function(){var i=parseInt(this.getAttribute("data-cpos"));if(S.flipped.indexOf(i)===-1){if(i===S.flipOrd){S.flipped.push(i);S.flipOrd++;if(S.flipOrd===10)setTimeout(function(){S.allRev=true;render()},600);else render()}}else{S.sel=S.sel===i?null:i;render()}}});
document.querySelectorAll("[data-sum]").forEach(function(e){e.onclick=function(){S.sel=parseInt(this.getAttribute("data-sum"));render()}});
document.querySelectorAll("[data-fstart]").forEach(function(e){e.onclick=function(){doFollow(parseInt(this.getAttribute("data-fstart")))}});
document.querySelectorAll("[data-fpick]").forEach(function(e){e.onclick=function(){var idx=parseInt(this.getAttribute("data-fpick"));if(S.followPI.indexOf(idx)!==-1||S.followPicked.length>=S.followCnt)return;S.followPI.push(idx);S.followPicked.push({card:S.followDeck[idx],reversed:Math.random()<.3});if(S.followPicked.length>=S.followCnt){setTimeout(function(){S.followUps.push({question:S.followQ,cards:S.followPicked.slice()});S.followMode=false;S.followPicked=[];S.followPI=[];S.followDeck=[];S.showTxt=false;render()},600)}else render()}});
}

function doFollow(n){if(!S.followIn.trim())return;S.followQ=S.followIn.trim();S.followIn="";S.followCnt=n;S.followDeck=shuffle(MAJOR_DECK);S.followPicked=[];S.followPI=[];S.followMode=true;render()}

render();
</script>
</body>
