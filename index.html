function makeCard(card,rev,flipped,size,posLabel){

var bg=isMaj?"linear-gradient(180deg,#fdf6e3,#f5e6c8,#ede0c8)":"linear-gradient(180deg,#faf8f5,#f0ece4)";
var h='<div style="width:'+sz.w+'px;height:'+sz.h+'px"><div style="width:100%;height:100%;position:relative;border-radius:8px;overflow:hidden;background:'+bg+';border:2px solid '+cc+'60;box-shadow:0 3px 14px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;'+(rev?'transform:rotate(180deg)':'')+'">';
if(posLabel) h+='<div style="position:absolute;top:2px;left:4px;font-size:'+(sz.n-2)+'px;color:#fff;background:'+cc+';border-radius:4px;padding:0 3px;font-weight:800;line-height:1.4;'+(rev?'transform:rotate(180deg)':'')+'">'+posLabel+D;
h+='<div style="font-size:'+(sz.n-1)+'px;font-weight:600;color:'+cc+';opacity:.7;margin-bottom:1px">'+card.num+D;
h+='<div style="font-size:'+sz.e+'px">'+card.sym+D;
h+='<div style="font-size:'+sz.t+'px;font-weight:700;color:#2c2c2c;text-align:center;line-height:1.2;margin-top:2px;padding:0 2px">'+card.kr+D;
if(isMaj) h+='<div style="font-size:'+(sz.n-2)+'px;color:#88776640;margin-top:1px">Major'+D;
else if(card.suit) h+='<div style="font-size:'+(sz.n-2)+'px;color:'+card.suit.color+'80;margin-top:1px">'+card.suit.kr+D;
if(rev) h+='<div style="position:absolute;bottom:3px;font-size:'+(sz.n-2)+'px;color:#c0392b;font-weight:700;'+(rev?'transform:rotate(180deg)':'')+'">\uc5ed\ubc29\ud5a5'+D;
h+=D+D;
return h
}

h+='<button id="copyBtn" style="width:100%;padding:18px;font-size:17px;background:'+(S.copied?'linear-gradient(135deg,#27ae60,#2ecc71)':'linear-gradient(135deg,#c9a84c,#8B6914)')+';color:#fff;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;font-weight:400;box-shadow:0 4px 20px rgba(139,105,20,.2);transition:background .3s">'+(S.copied?'\u2705 \ubcf5\uc0ac \uc644\ub8cc! Claude\uc5d0 \ubd99\uc5ec\ub123\uae30 \ud558\uc138\uc694':'\ud83d\udccb \uacb0\uacfc \ubcf5\uc0ac\ud558\uae30 (Claude\uc5d0 \ubd99\uc5ec\ub123\uae30\uc6a9)')+BTN;
h+='<p style="color:#9a8b78;font-size:12px;text-align:center;margin:10px 0 0;line-height:1.6">\ubcf5\uc0ac\ud55c \uacb0\uacfc\ub97c <a href="https://claude.ai" target="_blank" style="color:#8B6914">claude.ai'+A+'\uc5d0 \ubd99\uc5ec\ub123\uc73c\uba74<br>\uc0c1\ud669\uc5d0 \ub9de\ub294 \uc2ec\uce35 \ud574\uc11d\uc744 \ubc1b\uc744 \uc218 \uc788\uc5b4\uc694'+P;

h+='<div style="text-align:center;margin-top:12px"><button id="toggleTxt" style="background:none;border:none;color:#9a8b78;font-size:12px;cursor:pointer;text-decoration:underline">'+(S.showTxt?'\uacb0\uacfc \ud14d\uc2a4\ud2b8 \uc811\uae30':'\uacb0\uacfc \ud14d\uc2a4\ud2b8 \uc9c1\uc811 \ubcf4\uae30 (\uc218\ub3d9 \ubcf5\uc0ac)')+BTN+D;
if(S.showTxt) h+='<textarea readonly id="resultTxt" style="width:100%;margin-top:8px;padding:14px;font-size:12px;font-family:monospace;background:#f5eedf;border:1px solid #8B691420;border-radius:10px;color:#3d3426;resize:none;box-sizing:border-box;line-height:1.6;min-height:200px;outline:none">'+esc(fmtText())+TA;

S.followUps.forEach(function(fu,fi){
h+='<div style="margin-top:20px;padding:16px;background:#fff;border-radius:14px;border:1px solid #8B691415;animation:slideUp .5s ease;box-shadow:0 1px 8px rgba(0,0,0,.04)">';
h+='<div style="font-size:13px;color:#8B6914;font-weight:600;margin-bottom:10px">\ucd94\uac00 \uc9c8\ubb38 '+(fi+1)+': \u201c'+esc(fu.question)+'\u201d'+D;
h+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
fu.cards.forEach(function(c){
h+='<div style="display:flex;align-items:center;gap:8px">'+makeCard(c.card,c.reversed,true,"sm",null)+'<div><div style="font-size:13px;color:#3d3426;font-weight:600">'+c.card.kr+D+'<div style="font-size:11px;color:'+(c.reversed?'#c0392b':'#9a8b78')+'">'+(c.reversed?'\uc5ed\ubc29\ud5a5':'\uc815\ubc29\ud5a5')+D+D+D
});
h+=D+D
});

if(S.followMode){
h+='<div style="margin-top:20px;padding:20px;background:#fff;border-radius:16px;border:1px solid #8B691415;animation:slideUp .4s ease">';
h+='<div style="text-align:center;margin-bottom:16px"><p style="color:#8B6914;font-size:16px;margin:0 0 6px;font-weight:400">\u201c'+esc(S.followQ)+'\u201d'+P;
h+='<p style="color:#6b5d4d;font-size:14px;margin:0 0 4px">\uba54\uc774\uc800 \uc544\ub974\uce74\ub098 22\uc7a5\uc5d0\uc11c '+S.followCnt+'\uc7a5\uc744 \uace8\ub77c\uc8fc\uc138\uc694'+P;
h+='<p style="color:#9a8b78;font-size:13px;margin:0">'+S.followPicked.length+' / '+S.followCnt+P+D;
if(S.followPicked.length>0){
h+='<div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px">';
S.followPicked.forEach(function(c){h+=makeCard(c.card,c.reversed,true,"sm",null)});
h+=D
}
h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:5px">';
S.followDeck.forEach(function(_,i){
var pk=S.followPI.indexOf(i)!==-1;
h+='<div class="pick-card'+(pk?' picked':'')+'" data-fpick="'+i+'">'+(pk?'':'<span style="color:#c9a84c60;font-size:10px">\u2726'+SP)+D
});
h+=D+D
}

if(!S.followMode){
h+='<div style="margin-top:20px;padding:20px;background:#fff;border-radius:16px;border:1px solid #8B691415">';
h+='<p style="color:#8B6914;font-size:16px;margin:0 0 12px;font-weight:400;text-align:center">\u2726 \ucd94\uac00\ub85c \uce74\ub4dc\ub97c \ub354 \ubf51\uace0 \uc2f6\uc73c\uc2e0\uac00\uc694?'+P;
h+='<p style="color:#9a8b78;font-size:12px;margin:0 0 14px;text-align:center">\uc9c8\ubb38\uc744 \uc785\ub825\ud558\uace0 \uba54\uc774\uc800 \uc544\ub974\uce74\ub098\uc5d0\uc11c \uce74\ub4dc\ub97c \ubf51\uc73c\uc138\uc694.<br>\ubf51\uc740 \ub4a4 \ub2e4\uc2dc \uacb0\uacfc\ub97c \ubcf5\uc0ac\ud558\uc5ec \ud574\uc11d\ubc1b\uc744 \uc218 \uc788\uc5b4\uc694'+P;
h+='<input id="followIn" value="'+esc(S.followIn)+'" placeholder="\ucd94\uac00 \uc9c8\ubb38\uc744 \uc785\ub825\ud558\uc138\uc694..." style="width:100%;padding:13px 16px;font-size:15px;background:#f5eedf;border:1px solid #8B691420;border-radius:10px;color:#3d3426;outline:none;box-sizing:border-box;margin-bottom:10px"/>';
h+='<div style="display:flex;gap:8px">';
[1,2,3].forEach(function(n){
h+='<button data-fstart="'+n+'" style="flex:1;padding:12px;font-size:14px;background:linear-gradient(135deg,#c9a84c,#8B6914);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:400">'+n+'\uc7a5 \ubf51\uae30'+BTN
});
h+=D+D
}

h+='<button id="newBtn" style="margin-top:20px;width:100%;padding:14px;background:none;border:1px solid #8B691425;color:#9a8b78;border-radius:12px;cursor:pointer;font-size:14px;letter-spacing:2px">\uc0c8\ub85c\uc6b4 \ub9ac\ub529 \uc2dc\uc791'+BTN;
h+=D
}
h+=D;
return h
}

function fmtText(){
var t="\ud83d\udd2e \ucf08\ud2f1 \ud06c\ub85c\uc2a4 \ud0c0\ub85c \ub9ac\ub529 \uacb0\uacfc\n";
if(S.q) t+="\uc9c8\ubb38: "+S.q+"\n";
t+="\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n";
S.cards.forEach(function(c,i){
t+=POS[i].label+". "+POS[i].kr+": "+c.card.sym+" "+c.card.kr+" ("+(c.reversed?"\uc5ed\ubc29\ud5a5":"\uc815\ubc29\ud5a5")+") ["+(c.card.type==="major"?"\uba54\uc774\uc800":c.card.suit.kr)+"]\n"
});
if(S.followUps.length>0){
t+="\n\u2500\u2500\u2500 \ucd94\uac00 \uc9c8\ubb38 \u2500\u2500\u2500\n";
S.followUps.forEach(function(fu,fi){
t+="\nQ"+(fi+1)+": "+fu.question+"\n";
fu.cards.forEach(function(c){t+="  \u2192 "+c.card.sym+" "+c.card.kr+" ("+(c.reversed?"\uc5ed\ubc29\ud5a5":"\uc815\ubc29\ud5a5")+")\n"})
})
}
t+="\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\uc774 \ud0c0\ub85c \uacb0\uacfc\ub97c \uc2ec\uce35 \ud574\uc11d\ud574\uc8fc\uc138\uc694!";
return t
}

function doCopy(){
var text=fmtText();
try{navigator.clipboard.writeText(text).then(function(){S.copied=true;render();setTimeout(function(){S.copied=false;render()},2500)}).catch(fb)}catch(e){fb()}
function fb(){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);S.copied=true;render();setTimeout(function(){S.copied=false;render()},2500)}
}

function bindAll(){
var el;
if(el=document.getElementById("qIn")) el.oninput=function(){S.q=this.value};
if(el=document.getElementById("startBtn")) el.onclick=function(){S.deck=shuffle(DECK);S.picked=[];S.pickedCards=[];S.cards=[];S.flipped=[];S.sel=null;S.allRev=false;S.flipOrd=0;S.showTxt=false;S.copied=false;S.followUps=[];S.followIn="";S.followMode=false;S.followQ="";S.followDeck=[];S.followPicked=[];S.followPI=[];S.screen="picking";render()};
if(el=document.getElementById("backBtn")) el.onclick=function(){S.screen="intro";render()};
if(el=document.getElementById("resetBtn")) el.onclick=function(){S.screen="intro";S.q="";render()};
if(el=document.getElementById("newBtn")) el.onclick=function(){S.screen="intro";S.q="";render()};
if(el=document.getElementById("flipAllBtn")) el.onclick=function(){var d=0;for(var i=S.flipOrd;i<10;i++){(function(ii){setTimeout(function(){S.flipped.push(ii);S.flipOrd=ii+1;if(ii===9)setTimeout(function(){S.allRev=true;render()},300);else render()},d)})(i);d+=250}};
if(el=document.getElementById("closeDetail")) el.onclick=function(){S.sel=null;render()};
if(el=document.getElementById("copyBtn")) el.onclick=doCopy;
if(el=document.getElementById("toggleTxt")) el.onclick=function(){S.showTxt=!S.showTxt;render()};
if(el=document.getElementById("resultTxt")) el.onfocus=function(){this.select()};
if(el=document.getElementById("followIn")){el.oninput=function(){S.followIn=this.value};el.onkeydown=function(e){if(e.key==="Enter"&&S.followIn.trim())doFollow(1)}}

document.querySelectorAll("[data-pick]").forEach(function(e){e.onclick=function(){
var di=parseInt(this.getAttribute("data-pick"));
if(S.picked.indexOf(di)!==-1||S.pickedCards.length>=10) return;
S.picked.push(di);S.pickedCards.push({card:S.deck[di],reversed:Math.random()<.3});
if(S.pickedCards.length===10){render();setTimeout(function(){S.cards=S.pickedCards.slice();S.screen="reading";render()},800)}else render()
}});

document.querySelectorAll("[data-cpos]").forEach(function(e){e.onclick=function(){
var i=parseInt(this.getAttribute("data-cpos"));
if(S.flipped.indexOf(i)===-1){if(i===S.flipOrd){S.flipped.push(i);S.flipOrd++;if(S.flipOrd===10)setTimeout(function(){S.allRev=true;render()},600);else render()}}
else{S.sel=S.sel===i?null:i;render()}
}});

document.querySelectorAll("[data-sum]").forEach(function(e){e.onclick=function(){S.sel=parseInt(this.getAttribute("data-sum"));render()}});
document.querySelectorAll("[data-fstart]").forEach(function(e){e.onclick=function(){doFollow(parseInt(this.getAttribute("data-fstart")))}});
document.querySelectorAll("[data-fpick]").forEach(function(e){e.onclick=function(){
var idx=parseInt(this.getAttribute("data-fpick"));
if(S.followPI.indexOf(idx)!==-1||S.followPicked.length>=S.followCnt) return;
S.followPI.push(idx);S.followPicked.push({card:S.followDeck[idx],reversed:Math.random()<.3});
if(S.followPicked.length>=S.followCnt){setTimeout(function(){S.followUps.push({question:S.followQ,cards:S.followPicked.slice()});S.followMode=false;S.followPicked=[];S.followPI=[];S.followDeck=[];S.showTxt=false;render()},600)}else render()
}});
}

function doFollow(n){
if(!S.followIn.trim()) return;
S.followQ=S.followIn.trim();S.followIn="";S.followCnt=n;
S.followDeck=shuffle(DECK.filter(function(c){return c.type==="major"}));
S.followPicked=[];S.followPI=[];S.followMode=true;render()
}

render();
</script>
</body>
</html>
