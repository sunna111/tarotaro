.mode-btn .mode-text{flex:1}
.mode-btn .mode-title{font-size:16px;color:#8B6914;font-weight:400;margin-bottom:3px}
.mode-btn .mode-desc{font-size:11px;color:#9a8b78;line-height:1.5}
.mode-btn .mode-tag{display:inline-block;font-size:10px;color:#c9a84c;background:#f5eedf;border-radius:4px;padding:1px 6px;margin-top:4px}
.mode-btn-bottom{background:#fff;border:1px solid #8B691420;border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:all .3s;box-shadow:0 1px 8px rgba(0,0,0,.03);flex:1}
.mode-btn-bottom:hover{border-color:#8B691450;box-shadow:0 3px 14px rgba(139,105,20,.1);transform:translateY(-1px)}
.topbar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #8B691415;background:#fff}
.btn-back{background:none;border:1px solid #8B691440;color:#8B6914;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#8B6914);color:#fff;border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(139,105,20,.2);letter-spacing:2px}
.btn-copy{width:100%;padding:18px;font-size:17px;color:#fff;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;font-weight:400;box-shadow:0 4px 20px rgba(139,105,20,.2);transition:background .3s}

.hist-item:hover{border-color:#8B691440}
</style>

if(el=document.getElementById("modeHist"))el.onclick=function(){S.screen="history";render()};
// YN
if(el=document.getElementById("ynQIn"))el.oninput=function(){S.q=this.value};
document.querySelectorAll("[data-yncnt]").forEach(function(e){e.onclick=function(){S.ynCnt=parseInt(this.getAttribute("data-yncnt"));render()}});
if(el=document.getElementById("ynStartBtn"))el.onclick=function(){S.ynDeck=shuffle(MAJOR_DECK);S.ynPicked=[];S.ynPI=[];S.screen="ynPick";render()};
if(el=document.getElementById("ynBackBtn"))el.onclick=goHome;
if(el=document.getElementById("ynBack2"))el.onclick=function(){S.screen="ynSetup";render()};
document.querySelectorAll("[data-ynpick]").forEach(function(e){e.onclick=function(){var idx=parseInt(this.getAttribute("data-ynpick"));if(S.ynPI.indexOf(idx)!==-1||S.ynPicked.length>=S.ynCnt)return;S.ynPI.push(idx);S.ynPicked.push({card:S.ynDeck[idx],reversed:Math.random()<.3});if(S.ynPicked.length>=S.ynCnt){render();setTimeout(function(){S.screen="ynResult";saveHist("yn",S.q,S.ynPicked);render()},500)}else render()}});
// Three
if(el=document.getElementById("threeQIn"))el.oninput=function(){S.q=this.value};
if(el=document.getElementById("threeStartBtn"))el.onclick=function(){S.threeDeck=shuffle(MAJOR_DECK);S.threePicked=[];S.threePI=[];S.screen="threePick";render()};
if(el=document.getElementById("threeBackBtn"))el.onclick=goHome;
if(el=document.getElementById("threeBack2"))el.onclick=function(){S.screen="threeSetup";render()};
document.querySelectorAll("[data-threepick]").forEach(function(e){e.onclick=function(){var idx=parseInt(this.getAttribute("data-threepick"));if(S.threePI.indexOf(idx)!==-1||S.threePicked.length>=3)return;S.threePI.push(idx);S.threePicked.push({card:S.threeDeck[idx],reversed:Math.random()<.3});if(S.threePicked.length>=3){render();setTimeout(function(){S.screen="threeResult";saveHist("three",S.q,S.threePicked);render()},500)}else render()}});
// Alt
if(el=document.getElementById("altAIn"))el.oninput=function(){S.altA=this.value};
if(el=document.getElementById("altBIn"))el.oninput=function(){S.altB=this.value};
if(el=document.getElementById("altQIn"))el.oninput=function(){S.q=this.value};
if(el=document.getElementById("altStartBtn"))el.onclick=function(){S.altDeck=shuffle(MAJOR_DECK);S.altPicked=[];S.altPI=[];S.screen="altPick";render()};
if(el=document.getElementById("altBackBtn"))el.onclick=goHome;
if(el=document.getElementById("altBack2"))el.onclick=function(){S.screen="altSetup";render()};
document.querySelectorAll("[data-altpick]").forEach(function(e){e.onclick=function(){var idx=parseInt(this.getAttribute("data-altpick"));if(S.altPI.indexOf(idx)!==-1||S.altPicked.length>=4)return;S.altPI.push(idx);S.altPicked.push({card:S.altDeck[idx],reversed:Math.random()<.3});if(S.altPicked.length>=4){render();setTimeout(function(){S.screen="altResult";saveHist("alt",S.q,S.altPicked);render()},500)}else render()}});
// Celtic
if(el=document.getElementById("qIn"))el.oninput=function(){S.q=this.value};
if(el=document.getElementById("startBtn"))el.onclick=function(){S.deck=shuffle(DECK);S.picked=[];S.pickedCards=[];S.cards=[];S.flipped=[];S.sel=null;S.allRev=false;S.flipOrd=0;S.showTxt=false;S.copied=false;S.followUps=[];S.followIn="";S.followMode=false;S.screen="picking";render()};
if(el=document.getElementById("ccBackBtn"))el.onclick=goHome;
if(el=document.getElementById("backBtn"))el.onclick=function(){S.screen="intro";render()};
if(el=document.getElementById("resetBtn"))el.onclick=function(){S.screen="intro";S.q="";render()};
if(el=document.getElementById("flipAllBtn"))el.onclick=function(){var d=0;for(var i=S.flipOrd;i<10;i++){(function(ii){setTimeout(function(){S.flipped.push(ii);S.flipOrd=ii+1;if(ii===9)setTimeout(function(){S.allRev=true;saveHist("celtic",S.q,S.cards);render()},300);else render()},d)})(i);d+=200}};
if(el=document.getElementById("closeDetail"))el.onclick=function(){S.sel=null;render()};
if(el=document.getElementById("toggleTxt"))el.onclick=function(){S.showTxt=!S.showTxt;render()};
if(el=document.getElementById("resultTxt"))el.onfocus=function(){this.select()};
if(el=document.getElementById("copyBtn"))el.onclick=doCopy;
if(el=document.getElementById("newBtn"))el.onclick=goHome;
if(el=document.getElementById("againBtn"))el.onclick=function(){if(S.mode==="yn"){S.screen="ynSetup";S.ynPicked=[];S.ynPI=[]}else if(S.mode==="three"){S.screen="threeSetup";S.threePicked=[];S.threePI=[]}else if(S.mode==="alt"){S.screen="altSetup";S.altPicked=[];S.altPI=[]}else{S.screen="intro"}S.copied=false;render()};
if(el=document.getElementById("homeBtn"))el.onclick=goHome;
document.querySelectorAll("[data-pick]").forEach(function(e){e.onclick=function(){var di=parseInt(this.getAttribute("data-pick"));if(S.picked.indexOf(di)!==-1||S.pickedCards.length>=10)return;S.picked.push(di);S.pickedCards.push({card:S.deck[di],reversed:Math.random()<.3});if(S.pickedCards.length===10){render();setTimeout(function(){S.cards=S.pickedCards.slice();S.screen="reading";render()},700)}else render()}});
document.querySelectorAll("[data-cpos]").forEach(function(e){e.onclick=function(){var i=parseInt(this.getAttribute("data-cpos"));if(S.flipped.indexOf(i)===-1){if(i===S.flipOrd){S.flipped.push(i);S.flipOrd++;if(S.flipOrd===10)setTimeout(function(){S.allRev=true;saveHist("celtic",S.q,S.cards);render()},500);else render()}}else{S.sel=S.sel===i?null:i;render()}}});
document.querySelectorAll("[data-sum]").forEach(function(e){e.onclick=function(){S.sel=parseInt(this.getAttribute("data-sum"));render()}});
// Follow-up
if(el=document.getElementById("followIn")){el.oninput=function(){S.followIn=this.value};el.onkeydown=function(e){if(e.key==="Enter"&&S.followIn.trim())doFollow(1)}}
document.querySelectorAll("[data-fstart]").forEach(function(e){e.onclick=function(){doFollow(parseInt(this.getAttribute("data-fstart")))}});
document.querySelectorAll("[data-fpick]").forEach(function(e){e.onclick=function(){var idx=parseInt(this.getAttribute("data-fpick"));if(S.followPI.indexOf(idx)!==-1||S.followPicked.length>=S.followCnt)return;S.followPI.push(idx);S.followPicked.push({card:S.followDeck[idx],reversed:Math.random()<.3});if(S.followPicked.length>=S.followCnt){setTimeout(function(){S.followUps.push({question:S.followQ,cards:S.followPicked.slice()});S.followMode=false;S.followPicked=[];S.followPI=[];S.followDeck=[];S.showTxt=false;render()},500)}else render()}});
// Dict
if(el=document.getElementById("dictBack"))el.onclick=goHome;
document.querySelectorAll("[data-dictidx]").forEach(function(e){e.onclick=function(){S.dictSel=parseInt(this.getAttribute("data-dictidx"));S.screen="dictDetail";render()}});
if(el=document.getElementById("dictDetailBack"))el.onclick=function(){S.screen="dict";render()};
// History
if(el=document.getElementById("histBack"))el.onclick=goHome;
if(el=document.getElementById("clearHist"))el.onclick=function(){if(confirm("\ub9ac\ub529 \uae30\ub85d\uc744 \ubaa8\ub450 \uc0ad\uc81c\ud560\uae4c\uc694?")){try{localStorage.removeItem("tarot_hist")}catch(e){}render()}};
// Daily
if(el=document.getElementById("dailyBackHome"))el.onclick=goHome;
document.querySelectorAll("[data-dailypick]").forEach(function(e){e.onclick=function(){
var idx=parseInt(this.getAttribute("data-dailypick"));
if(S.dailyPI&&S.dailyPI.indexOf(idx)!==-1)return;
if(!S.dailyPI)S.dailyPI=[];
S.dailyPI.push(idx);
var card=S.dailyDeck[idx];var rev=Math.random()<.3;
S.dailyCard=card;S.dailyRev=rev;
saveDailyCard(card.index,rev);
saveHist("daily","",[ {card:card,reversed:rev}]);
render()}});
if(el=document.getElementById("dailyCopy"))el.onclick=function(){var text=dailyFmtText();try{navigator.clipboard.writeText(text).then(ok).catch(fb)}catch(e){fb()}function ok(){S.copied=true;render();setTimeout(function(){S.copied=false;render()},2500)}function fb(){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);ok()}};
if(el=document.getElementById("dailyHome"))el.onclick=goHome;
}

render();
</script>
</body>
</html>
